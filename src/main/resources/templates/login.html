<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Classroom 계정만들기</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
<div class="w-full h-screen flex justify-center items-center bg-gray-100">
    <div class="w-3xl h-auto p-10 rounded-lg flex bg-white gap-6">
        <div class="flex-1">
            <h1 class="text-3xl">로그인</h1>
            <p class="mt-5 text-sm">
                수업에 참여하기 위해 계정으로 로그인하세요.<br/>
                로그인 후 나의 클래스와 과제를 확인할 수 있습니다.
            </p>
        </div>
        <div class="flex-1 mt-15">
            <form class="space-y-2" action="/login" method="post" autocomplete="off">
                <div class="relative">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                         class="size-6 absolute left-2 top-1/2 -translate-y-1/2 text-gray-600">
                        <path fill-rule="evenodd" d="M18.685 19.097A9.723 9.723 0 0 0 21.75 12c0-5.385-4.365-9.75-9.75-9.75S2.25 6.615 2.25 12a9.723 9.723 0 0 0 3.065 7.097A9.716 9.716 0 0 0 12 21.75a9.716 9.716 0 0 0 6.685-2.653Zm-12.54-1.285A7.486 7.486 0 0 1 12 15a7.486 7.486 0 0 1 5.855 2.812A8.224 8.224 0 0 1 12 20.25a8.224 8.224 0 0 1-5.855-2.438ZM15.75 9a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" clip-rule="evenodd" />
                    </svg>
                    <input name="id" type="text" class="border border-stone-400 rounded px-10 py-2 w-full"
                           placeholder="아이디"/>
                </div>
                <div class="-mt-2 ml-1">
                    <a href="/account/recovery" class="text-emerald-700 text-xs ">계정 아이디를 잊으셨나요?</a>
                </div>
                <div class="relative">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                         class="size-6 absolute left-2 top-1/2 -translate-y-1/2 text-gray-600">
                        <path fill-rule="evenodd" d="M15.75 1.5a6.75 6.75 0 0 0-6.651 7.906c.067.39-.032.717-.221.906l-6.5 6.499a3 3 0 0 0-.878 2.121v2.818c0 .414.336.75.75.75H6a.75.75 0 0 0 .75-.75v-1.5h1.5A.75.75 0 0 0 9 19.5V18h1.5a.75.75 0 0 0 .53-.22l2.658-2.658c.19-.189.517-.288.906-.22A6.75 6.75 0 1 0 15.75 1.5Zm0 3a.75.75 0 0 0 0 1.5A2.25 2.25 0 0 1 18 8.25a.75.75 0 0 0 1.5 0 3.75 3.75 0 0 0-3.75-3.75Z" clip-rule="evenodd" />
                    </svg>
                    <input name="password" type="password" class="border border-stone-400 rounded px-10 py-2 w-full"
                           placeholder="비밀번호"/>
                </div>
                <div th:if="${error != null}" class="mt-3 p-4 rounded-lg text-white bg-red-400 text-sm" >
                    아이디 또는 비밀번호가 일치하지 않습니다.
                </div>

                <div class="mt-3 text-right space-x-2">
                    <button type="button" class="rounded-2xl px-2 py-2 text-emerald-700 hover:bg-gray-100"
                        onclick="location.href='/signup/account'">계정 만들기</button>
                    <button class="rounded-2xl px-4 py-2 bg-emerald-700/60 text-white hover:bg-emerald-700">다음</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
