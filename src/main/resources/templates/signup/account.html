<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Classroom 계정만들기</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="w-full h-screen flex justify-center items-center bg-gray-100">
        <div class="w-4xl h-auto p-10 rounded-lg flex bg-white">
            <div class="flex-1">
                <h1 class="text-3xl">Classroom 계정만들기</h1>
                <!--
                <a href="https://www.naver.com" onclick="return false;">네이버로.</a>
                <a href="https://www.naver.com" onclick="event.preventDefault();">네이버로.</a>
                -->
                <p class="mt-5 text-sm">
                    수업에 참여하기 위한 계정을 생성하세요.<br/>
                    이메일은 인증용으로 사용되니 정확히 입력해주세요.
                </p>
            </div>
            <div class="flex-1 ">
                <form class="space-y-2" action="/signup/account" method="post" autocomplete="off" onsubmit="return formCheck();">
                    <div>
                        <div class="relative">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                 stroke-width="1.5" stroke="currentColor" class="size-6 absolute left-3 top-1/2 -translate-y-1/2 text-gray-600">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                            </svg>
                            <input id="id" name="id" type="text" onfocusout="sendIdCheckAjax();"
                                   class="border border-stone-400 rounded px-10 py-2 w-full" placeholder="아이디"/>
                        </div>
                        <span class="text-sm text-red-500 hidden">아이디를 입력하세요.</span>
                    </div>
                    <div>
                        <input id="password" name="password" type="password" class="border rounded border-stone-400 px-4 py-2 w-full" placeholder="비밀번호"/>
                        <span class="text-sm text-red-500 hidden">비밀번호를 입력하세요.</span>
                    </div>
                    <div>
                        <input id="email" name="email" type="text" class="border rounded border-stone-400 px-4 py-2 w-full" placeholder="이메일"/>
                        <span class="text-sm text-red-500 hidden">이메일을 입력하세요.</span>
                    </div>
                    <div class="mt-3 text-right">
                        <button class="border rounded px-2 py-1" disabled>다음</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
        function sendIdCheckAjax() {
            const $id = document.getElementById("id");
            const xhr = new XMLHttpRequest();
            xhr.open("get", "/ajax/signup/idcheck?id="+$id.value);
            xhr.onloadend = function() {
                if(xhr.responseText === 'available') {
                    $id.classList.add("border-stone-400");
                    $id.classList.remove("border-red-400");
                } else {
                    $id.classList.remove("border-stone-400");
                    $id.classList.add("border-red-400");
                }
            }
            xhr.send();
        }


        function formCheck() {
            const $id = document.getElementById("id");
            const $password = document.getElementById("password");
            const $email = document.getElementById("email");
            if($id.value && $password.value && $email.value) {
                return true;
            } else {
                if(!$id.value ) {
                    $id.classList.remove("border-stone-400");
                    $id.classList.add("border-red-500");
                    $id.parentElement.nextElementSibling.classList.remove("hidden");
                }else {
                    $id.classList.remove("border-red-500");
                    $id.classList.add("border-stone-400");
                    $id.parentElement.nextElementSibling.classList.add("hidden");
                }

                if ($password.value === "") {
                    $password.classList.remove("border-stone-400");
                    $password.classList.add("border-red-400");
                }
                if ($email.value === "") {
                    $email.classList.remove("border-stone-400");
                    $email.classList.add("border-red-400");
                }
                return false;
            }



        }
    </script>
</body>
</html>
